<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance API Sandbox</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 2rem; display: flex; gap: 2rem; }
    .panel { background: #1e293b; padding: 1.5rem; border-radius: 8px; flex: 1; border: 1px solid #334155; }
    h2 { margin-top: 0; font-size: 1.25rem; color: #38bdf8; }
    input, select, button { width: 100%; box-sizing: border-box; margin-bottom: 1rem; padding: 0.75rem; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: #fff; }
    button { background: #0284c7; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #0369a1; }
    pre { background: #000; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; color: #a7f3d0; border: 1px solid #064e3b; min-height: 200px; }
    .row { display: flex; gap: 1rem; }
  </style>
</head>
<body>

  <!-- Left Panel: Controls -->
  <div class="panel">
    <h2>1. Authentication</h2>
    <div class="row">
      <input type="email" id="email" placeholder="Email" value="demo@zorvyn.com">
      <input type="password" id="password" placeholder="Password" value="password123">
    </div>
    <div class="row">
      <select id="role">
        <option value="ADMIN">ADMIN</option>
        <option value="ANALYST">ANALYST</option>
        <option value="VIEWER">VIEWER</option>
      </select>
    </div>
    <div class="row">
      <button onclick="register()">Register</button>
      <button onclick="login()">Login</button>
    </div>
    <small>Current Token: <span id="tokenStatus" style="color: #fbbf24;">None</span></small>

    <h2 style="margin-top: 2rem;">2. API Endpoints</h2>
    <button onclick="getDashboard()">GET /api/dashboard/summary</button>
    
    <div style="margin-top: 1rem; padding: 1rem; border: 1px dashed #475569; border-radius: 4px;">
      <h3 style="margin-top: 0; font-size: 1rem;">Create Record (Admin)</h3>
      <input type="number" id="amount" placeholder="Amount (e.g. 500)">
      <select id="type">
        <option value="INCOME">INCOME</option>
        <option value="EXPENSE">EXPENSE</option>
      </select>
      <button onclick="createRecord()">POST /api/records</button>
    </div>
  </div>

  <!-- Right Panel: Output -->
  <div class="panel" style="flex: 1.5;">
    <h2>Server Response / Output</h2>
    <pre id="output">Initialize the system by registering a user...</pre>
  </div>

  <script>
    let token = '';

    function log(data) {
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    async function req(endpoint, method, body = null) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      try {
        const res = await fetch(`http://localhost:3000${endpoint}`, {
          method,
          headers,
          body: body ? JSON.stringify(body) : null
        });
        const json = await res.json().catch(() => ({}));
        log(json);
        return json;
      } catch (e) {
        log({ _error: e.message });
      }
    }

    async function register() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      await req('/api/auth/register', 'POST', { email, password, role });
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await req('/api/auth/login', 'POST', { email, password });
      if (res.token) {
        token = res.token;
        document.getElementById('tokenStatus').textContent = 'Loaded (' + res.user.role + ')';
        document.getElementById('tokenStatus').style.color = '#34d399';
      }
    }

    async function getDashboard() {
      await req('/api/dashboard/summary', 'GET');
    }

    async function createRecord() {
      const amount = parseFloat(document.getElementById('amount').value);
      const type = document.getElementById('type').value;
      if (!amount) return alert('Enter an amount first');
      await req('/api/records', 'POST', {
        amount, type, category: 'General', date: new Date().toISOString(), description: 'Sandbox entry'
      });
    }
  </script>
</body>
</html>
